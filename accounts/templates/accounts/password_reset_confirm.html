{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-16 px-4">
    <div class="space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-black uppercase tracking-tighter text-zinc-900">New Password</h1>
            <p class="text-zinc-500 font-medium text-sm mt-2">Create a secure password for your account.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
                <div class="space-y-1">
                    <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">{{ field.label }}</label>
                    <div class="relative">
                        {{ field }}
                        <button type="button" onclick="toggleResetPass(this)" 
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-950 transition-colors focus:outline-none bg-transparent border-none p-0 outline-none">
                            <i class="ph ph-eye text-xl"></i>
                        </button>
                    </div>
                    {% for error in field.errors %}
                        <p class="text-[9px] text-red-600 font-black uppercase mt-1 ml-1">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit" class="w-full bg-zinc-950 text-white font-black py-4 rounded-md hover:bg-black transition border border-zinc-950 uppercase tracking-[0.2em] text-xs">
                Confirm New Password
            </button>
        </form>
    </div>
</div>

<style>
    .helptext { display: none; }
    button:focus { outline: none !important; box-shadow: none !important; }
</style>

<script>
    document.querySelectorAll('input').forEach(input => {
        if(input.type === 'password') {
            input.className = "w-full p-4 bg-white border border-zinc-300 rounded-md focus:outline-none focus:border-zinc-950 font-bold text-sm transition-all";
        }
    });

    function toggleResetPass(btn) {
        const input = btn.previousElementSibling;
        const icon = btn.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.className = "ph ph-eye-closed text-xl";
        } else {
            input.type = "password";
            icon.className = "ph ph-eye text-xl";
        }
    }
</script>
{% endblock %}
