{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-16 px-4">
    <div class="space-y-8 text-center">
        <div>
            <h1 class="text-4xl font-black uppercase tracking-tighter text-zinc-900">Reset Password</h1>
            <p class="text-zinc-500 font-medium text-sm mt-2">Enter your email to receive a secure reset link.</p>
        </div>

        <form method="POST" class="space-y-5 text-left">
            {% csrf_token %}
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">Email Address</label>
                <input type="email" name="email" required value="{{ request.POST.email|default:'' }}"
                       class="w-full p-4 bg-white border border-zinc-300 rounded-md focus:outline-none focus:border-zinc-950 font-bold text-sm transition-all">
            </div>

            <button type="submit" class="w-full bg-zinc-950 text-white font-black py-4 rounded-md hover:bg-black transition border border-zinc-950 uppercase tracking-[0.2em] text-xs">
                Send Reset Link
            </button>
        </form>
        
        <a href="{% url 'login' %}" class="block text-xs font-black uppercase tracking-widest text-zinc-400 hover:text-zinc-950 transition">Back to Login</a>
    </div>
</div>
{% endblock %}
