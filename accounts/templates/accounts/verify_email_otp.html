{% extends 'core/base.html' %}
{% block content %}
<div class="max-w-md mx-auto py-16 px-4">
    <div class="space-y-8 text-center">
        <div>
            <h1 class="text-4xl font-black uppercase tracking-tighter text-zinc-900">Verify Email</h1>
            <p class="text-zinc-500 font-medium text-sm mt-2">Enter the 6-digit OTP sent to your email.</p>
        </div>

        <form method="POST" class="space-y-5 text-left">
            {% csrf_token %}
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">Email Address</label>
                <input type="email" name="email" value="{{ email_hint }}" required
                       class="w-full p-4 bg-white border border-zinc-300 rounded-md focus:outline-none focus:border-zinc-950 font-bold text-sm transition-all">
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">OTP Code</label>
                <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required
                       placeholder="6-digit code"
                       class="w-full p-4 bg-white border border-zinc-300 rounded-md focus:outline-none focus:border-zinc-950 font-bold text-sm tracking-[0.25em] text-center transition-all">
            </div>

            <button type="submit" class="w-full bg-zinc-950 text-white font-black py-4 rounded-md hover:bg-black transition border border-zinc-950 uppercase tracking-[0.2em] text-xs">
                Verify Account
            </button>
        </form>
        <form method="POST" class="text-left">
            {% csrf_token %}
            <input type="hidden" name="action" value="resend">
            <input type="hidden" name="email" value="{{ email_hint }}">
            <button type="submit" class="w-full border border-zinc-300 text-zinc-700 font-black py-3 rounded-md hover:bg-zinc-50 transition uppercase tracking-[0.2em] text-[10px]">
                Resend OTP
            </button>
            <p class="mt-2 text-[10px] font-medium text-zinc-500">Resend is limited to once every 30 seconds.</p>
        </form>

        <a href="{% url 'login' %}" class="block text-xs font-black uppercase tracking-widest text-zinc-400 hover:text-zinc-950 transition">Back to Login</a>
    </div>
</div>
{% endblock %}
