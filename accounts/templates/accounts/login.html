{% extends 'core/base.html' %}
{% load socialaccount %}

{% block content %}
<div class="max-w-md mx-auto py-16 px-4">
    <div class="space-y-8">

        <div class="text-center">
            <h1 class="text-4xl font-black uppercase tracking-tighter text-zinc-900">Welcome Back</h1>
            <p class="text-zinc-500 font-medium text-sm mt-2">Enter your credentials to access the debate.</p>
        </div>

        {% if login_error %}
            <div class="p-4 rounded-md text-[10px] font-black uppercase tracking-widest border bg-red-50 text-red-700 border-red-200">
                {{ login_error }}
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">

            <div class="space-y-1">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">Username</label>
                <input type="text" name="username" value="{{ request.POST.username|default:'' }}" required
                       class="w-full p-4 bg-white border border-zinc-300 rounded-md focus:outline-none focus:border-zinc-950 font-bold text-sm transition-all">
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">Password</label>
                <div class="relative group">
                    <input type="password" name="password" id="login_password" required
                           class="w-full p-4 bg-white border border-zinc-300 rounded-md focus:outline-none focus:border-zinc-950 font-bold text-sm transition-all">
                    <button type="button" onclick="toggleLoginPassword(this)"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-950 transition-colors focus:outline-none bg-transparent border-none p-0 outline-none">
                        <i class="ph ph-eye text-xl"></i>
                    </button>
                </div>
            </div>

            <div class="flex justify-end">
                <a href="{% url 'password_reset' %}" class="text-[9px] font-black uppercase tracking-widest text-zinc-400 hover:text-red-600 transition">Forgot Password?</a>
            </div>

            <button type="submit" class="w-full bg-zinc-950 text-white font-black py-4 rounded-md hover:bg-black transition border border-zinc-950 uppercase tracking-[0.2em] text-xs mt-2">
                Log In
            </button>
        </form>

        <div class="space-y-3">
            <div class="relative">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-zinc-200"></div></div>
                <div class="relative flex justify-center text-[9px] font-black uppercase tracking-widest text-zinc-400">
                    <span class="bg-white px-2">or continue with</span>
                </div>
            </div>
            <button type="button" disabled class="w-full min-h-[44px] px-4 py-3 border border-zinc-300 rounded-md text-[10px] font-black uppercase tracking-widest text-zinc-400 bg-zinc-50 flex items-center justify-center gap-2 cursor-not-allowed">
                <i class="ph ph-google-logo text-base"></i> Google
            </button>
            <button type="button" disabled class="w-full min-h-[44px] px-4 py-3 border border-zinc-300 rounded-md text-[10px] font-black uppercase tracking-widest text-zinc-400 bg-zinc-50 flex items-center justify-center gap-2 cursor-not-allowed">
                <i class="ph ph-apple-logo text-base"></i> Apple
            </button>
        </div>

        <div class="pt-6 border-t border-zinc-200 text-center">
            <p class="text-xs font-medium text-zinc-500">
                New to the platform?
                <a href="{% url 'register' %}" class="text-zinc-950 font-black uppercase tracking-widest hover:text-red-600 transition ml-1">Join the debate</a>
            </p>
        </div>
    </div>
</div>

<style>
    /* Global reset for focus outlines on buttons */
    button:focus { outline: none !important; box-shadow: none !important; }
</style>

<script>
    function toggleLoginPassword(btn) {
        const passwordInput = document.getElementById('login_password');
        const icon = btn.querySelector('i');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.className = 'ph ph-eye-closed text-xl';
        } else {
            passwordInput.type = 'password';
            icon.className = 'ph ph-eye text-xl';
        }
    }
</script>
{% endblock %}
