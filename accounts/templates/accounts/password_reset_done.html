{% extends 'core/base.html' %}
{% block content %}
<div class="max-w-md mx-auto py-24 text-center space-y-6">
    <i class="ph ph-key text-6xl text-zinc-900"></i>
    <h1 class="text-3xl font-black uppercase tracking-tighter">Enter Reset Code</h1>
    <p class="text-zinc-500 font-medium text-sm">Enter the 6-digit code sent to your email{% if email_hint %} ({{ email_hint }}){% endif %}.</p>
    <form method="POST" class="space-y-4 text-left">
        {% csrf_token %}
        <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6-digit OTP code"
               class="w-full p-4 bg-white border border-zinc-300 rounded-md focus:outline-none focus:border-zinc-950 font-bold text-sm transition-all text-center tracking-[0.3em]">
        <button type="submit" class="w-full px-8 py-3 bg-zinc-950 text-white font-black uppercase tracking-widest text-[10px] rounded-md">Verify Code</button>
    </form>
    <form method="POST" class="space-y-3 text-left">
        {% csrf_token %}
        <input type="hidden" name="action" value="resend">
        <button type="submit" class="w-full px-8 py-3 border border-zinc-300 text-zinc-700 font-black uppercase tracking-widest text-[10px] rounded-md hover:bg-zinc-50">
            Resend Code
        </button>
        <p class="text-[10px] font-medium text-zinc-500">Resend is limited to once every 30 seconds.</p>
    </form>
</div>
{% endblock %}
