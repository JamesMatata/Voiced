<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f7fb;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
          <tr>
            <td style="padding:20px 24px;background:#58cc02;color:#ffffff;">
              <h1 style="margin:0;font-size:20px;line-height:1.2;font-weight:800;">Voiced</h1>
              <p style="margin:6px 0 0 0;font-size:13px;opacity:.95;">{{ title }}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px 0;font-size:14px;line-height:1.6;">Use this verification code to continue:</p>
              <div style="margin:8px 0 18px 0;padding:14px 16px;background:#f9fafb;border:1px dashed #d1d5db;border-radius:10px;text-align:center;">
                <span style="display:inline-block;font-size:30px;letter-spacing:6px;font-weight:900;color:#111827;">{{ code }}</span>
              </div>
              <p style="margin:0 0 8px 0;font-size:13px;line-height:1.6;color:#4b5563;">This code expires in {{ minutes }} minutes.</p>
              <p style="margin:0;font-size:12px;line-height:1.6;color:#6b7280;">If you did not request this code, you can ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:14px 24px;background:#f9fafb;border-top:1px solid #e5e7eb;">
              <p style="margin:0;font-size:11px;line-height:1.6;color:#6b7280;">Need help? Reply to this email or contact {{ support_email }}.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
